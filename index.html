<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AfriQuiz Pro | Ultimate Secure Exam Platform</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    
    body {
      background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
    }
    
    body.light-mode {
      background: linear-gradient(-45deg, #f5f7fa, #c3cfe2, #f5f7fa, #c3cfe2);
    }
    
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; overflow: hidden; }
    .particle { position: absolute; background: rgba(6, 182, 212, 0.15); border-radius: 50%; animation: float 15s infinite linear; }
    @keyframes float { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; } }
    
    .glass { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); position: relative; z-index: 1; }
    .glass-light { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); }
    .glass-strong { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(6, 182, 212, 0.3); }
    
    body.light-mode .glass { background: rgba(255,255,255,0.75); border: 1px solid rgba(0,0,0,0.08); }
    body.light-mode .glass-light { background: rgba(255,255,255,0.5); }
    
    .btn-primary { background: linear-gradient(135deg, #06b6d4, #8b5cf6); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
    .btn-primary::before { content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-radius: 50%; background: rgba(255,255,255,0.3); transform: translate(-50%, -50%); transition: width 0.6s, height 0.6s; }
    .btn-primary:hover::before { width: 300px; height: 300px; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(6,182,212,0.4); }
    .btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); transition: all 0.3s; }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
    
    .fade-in { animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    
    .quiz-option { transition: all 0.2s; cursor: pointer; border: 2px solid rgba(71, 85, 105, 0.5); }
    .quiz-option.selected { background: linear-gradient(135deg, rgba(6,182,212,0.25), rgba(139,92,246,0.15)); border-color: #06b6d4; box-shadow: 0 0 20px rgba(6,182,212,0.4); }
    
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 10000; animation: slideRight 0.4s; background: #1e293b; border-radius: 12px; padding: 12px 20px; color: white; font-size: 14px; border-left: 4px solid #06b6d4; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
    @keyframes slideRight { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
    
    input:focus, textarea:focus, select:focus { outline: none; box-shadow: 0 0 0 3px rgba(6,182,212,0.3); border-color: #06b6d4; }
    .sidebar-link { transition: all 0.2s; cursor: pointer; }
    .sidebar-link:hover, .sidebar-link.active { background: rgba(6,182,212,0.15); color: #06b6d4; transform: translateX(5px); }
    
    .timer-glow { animation: timerPulse 1s infinite; }
    @keyframes timerPulse { 0%, 100% { text-shadow: 0 0 5px rgba(6,182,212,0.5); } 50% { text-shadow: 0 0 20px rgba(6,182,212,0.8); } }
    
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(6,182,212,0.5); border-radius: 10px; }
    
    .motivation-bar { background: linear-gradient(90deg, rgba(6,182,212,0.2), rgba(139,92,246,0.2), rgba(6,182,212,0.2)); border-top: 1px solid rgba(6,182,212,0.3); border-bottom: 1px solid rgba(6,182,212,0.3); }
    
    .theme-switch { position: relative; width: 50px; height: 24px; background: #334155; border-radius: 30px; cursor: pointer; transition: 0.3s; display: inline-block; }
    .theme-switch.active { background: #06b6d4; }
    .theme-switch .slider { position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; top: 2px; left: 3px; transition: 0.3s; }
    .theme-switch.active .slider { left: 27px; }
    
    .media-preview { max-width: 100%; max-height: 200px; border-radius: 10px; margin-top: 10px; }
    .media-upload-btn { background: rgba(6,182,212,0.2); border: 2px dashed rgba(6,182,212,0.5); border-radius: 10px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.3s; margin: 5px 0; }
    .media-upload-btn:hover { background: rgba(6,182,212,0.3); border-color: #06b6d4; }
    
    #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
    
    /* PDF Report Styles */
    .pdf-report { font-family: 'Inter', sans-serif; padding: 40px; background: white; color: #1a202c; }
    .pdf-report h1 { color: #06b6d4; font-size: 28px; margin-bottom: 10px; }
    .pdf-report .header { border-bottom: 2px solid #06b6d4; margin-bottom: 20px; padding-bottom: 10px; }
    .pdf-report table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .pdf-report th, .pdf-report td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    .pdf-report th { background: #06b6d4; color: white; }
    .pdf-report .score-high { color: #22c55e; font-weight: bold; }
    .pdf-report .score-low { color: #ef4444; font-weight: bold; }
  </style>
</head>
<body class="text-slate-100">
  <canvas id="confetti-canvas"></canvas>
  <div class="particles" id="particles"></div>
  <div id="app" class="h-full overflow-y-auto relative z-10"></div>

  <script>
    // ==================== DATA STORAGE ====================
    let allQuizzes = [], allSubmissions = [];
    let currentTeacher = null, currentStudent = null, currentQuiz = null, currentQuestionIdx = 0, studentAnswers = [];
    let timerInterval = null, timeRemaining = 0, editingQuizId = null, questionsList = [];
    let isExamActive = false, violationLogs = [], examLocked = false;
    let darkMode = false;
    
    // ==================== SECURITY - ONLY ACTIVE DURING EXAM ====================
    let securityListeners = [];
    
    function activateExamSecurity() {
      isExamActive = true;
      violationLogs = [];
      examLocked = false;
      
      const blockContext = (e) => { e.preventDefault(); logViolation('Right-click'); return false; };
      const blockKeys = (e) => {
        if (!isExamActive) return;
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C' || e.key === 'J')) || (e.ctrlKey && e.key === 'u')) {
          e.preventDefault(); logViolation('DevTools');
        }
        if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'x' || e.key === 'v' || e.key === 's')) {
          e.preventDefault(); logViolation('Copy/Paste');
        }
        if (e.key === 'PrintScreen') { e.preventDefault(); logViolation('Screenshot'); }
      };
      const blockClipboard = (e) => { if (isExamActive) { e.preventDefault(); logViolation(e.type); } };
      const handleVisibility = () => {
        if (isExamActive && document.hidden && !examLocked) {
          logViolation('Tab Switch');
          examLocked = true;
          showCheatWarning('⚠️ Tab switching detected! Exam will auto-submit.');
          setTimeout(() => { if (isExamActive) submitQuiz(); }, 3000);
        }
      };
      
      document.addEventListener('contextmenu', blockContext);
      document.addEventListener('keydown', blockKeys);
      document.addEventListener('copy', blockClipboard);
      document.addEventListener('cut', blockClipboard);
      document.addEventListener('paste', blockClipboard);
      document.addEventListener('visibilitychange', handleVisibility);
      
      securityListeners = [{ type: 'contextmenu', handler: blockContext }, { type: 'keydown', handler: blockKeys }, 
        { type: 'copy', handler: blockClipboard }, { type: 'cut', handler: blockClipboard }, 
        { type: 'paste', handler: blockClipboard }, { type: 'visibilitychange', handler: handleVisibility }];
    }
    
    function deactivateExamSecurity() {
      isExamActive = false;
      securityListeners.forEach(listener => document.removeEventListener(listener.type, listener.handler));
      securityListeners = [];
    }
    
    function logViolation(reason) {
      violationLogs.push({ reason, timestamp: new Date().toISOString() });
      const badge = document.getElementById('violationCount');
      if (badge) {
        badge.textContent = violationLogs.length;
        if (violationLogs.length >= 3) toast('⚠️ Multiple violations!', 'error');
      }
    }
    
    function showCheatWarning(msg) {
      const modal = document.getElementById('anti-cheat-modal');
      if (modal) {
        document.getElementById('cheat-message').textContent = msg;
        modal.classList.remove('hidden');
      }
    }
    
    function handleCheatAcknowledge() {
      document.getElementById('anti-cheat-modal').classList.add('hidden');
      examLocked = false;
    }
    
    // ==================== HELPER FUNCTIONS ====================
    function toast(msg, type = 'success') {
      const div = document.createElement('div');
      div.className = 'toast';
      div.innerHTML = msg;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 4000);
    }
    
    function generateParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        const size = Math.random() * 8 + 2;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
        particle.style.opacity = Math.random() * 0.5 + 0.2;
        container.appendChild(particle);
      }
    }
    
    function showConfetti() {
      const canvas = document.getElementById('confetti-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const particles = [];
      for (let i = 0; i < 150; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height, size: Math.random() * 8 + 4, speedY: Math.random() * 5 + 3, speedX: Math.random() * 2 - 1, color: `hsl(${Math.random() * 360}, 70%, 60%)`, rotation: Math.random() * 360, rotationSpeed: Math.random() * 10 - 5 });
      let animationId;
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let allFinished = true;
        particles.forEach(p => {
          if (p.y < canvas.height) { allFinished = false; p.y += p.speedY; p.x += p.speedX; p.rotation += p.rotationSpeed; ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotation * Math.PI / 180); ctx.fillStyle = p.color; ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size); ctx.restore(); }
        });
        if (!allFinished) animationId = requestAnimationFrame(animate);
        else { cancelAnimationFrame(animationId); ctx.clearRect(0, 0, canvas.width, canvas.height); }
      }
      animate();
      setTimeout(() => { if (animationId) cancelAnimationFrame(animationId); ctx.clearRect(0, 0, canvas.width, canvas.height); }, 5000);
    }
    
    // ==================== STORAGE ====================
    function saveQuizzes() { localStorage.setItem('afriquiz_quizzes', JSON.stringify(allQuizzes)); }
    function loadQuizzes() { const saved = localStorage.getItem('afriquiz_quizzes'); if (saved && saved !== '[]') allQuizzes = JSON.parse(saved); else loadSampleQuizzes(); }
    function saveSubmissions() { localStorage.setItem('afriquiz_submissions', JSON.stringify(allSubmissions)); }
    function loadSubmissions() { const saved = localStorage.getItem('afriquiz_submissions'); if (saved) allSubmissions = JSON.parse(saved); }
    
    function loadSampleQuizzes() {
      allQuizzes = [
        { id: 'Q1', title: 'Biology Midterm', subject: 'Biology', code: 'BIO123', passing_mark: 60, time_limit: 45, max_retakes: 2, rules: 'No calculators allowed', footer: '© AfriQuiz Pro', questions: [{ type: 'multiple', text: 'What is the powerhouse of the cell?', options: ['Nucleus', 'Mitochondria', 'Ribosome', 'Chloroplast'], correct: 1, points: 2, media: null }] },
        { id: 'Q2', title: 'Math Assessment', subject: 'Mathematics', code: 'MATH01', passing_mark: 50, time_limit: 30, max_retakes: 3, rules: 'Show your working', footer: '© AfriQuiz Pro', questions: [{ type: 'multiple', text: 'Solve: 2x + 5 = 15', options: ['x=3', 'x=5', 'x=10', 'x=7'], correct: 1, points: 2, media: null }] }
      ];
      saveQuizzes();
    }
    
    function escapeHtml(text) { if (!text) return ''; const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
    
    // ==================== PDF EXPORT ====================
    function exportPDFReport() {
      const avg = allSubmissions.length ? Math.round(allSubmissions.reduce((a,b)=>a+b.percentage,0)/allSubmissions.length) : 0;
      const passCount = allSubmissions.filter(s=>s.percentage>=50).length;
      const passRate = allSubmissions.length ? Math.round(passCount/allSubmissions.length*100) : 0;
      
      const reportHtml = `
        <div class="pdf-report">
          <div class="header">
            <h1>🎓 AfriQuiz Pro - Assessment Report</h1>
            <p>Generated: ${new Date().toLocaleString()}</p>
            <p>Teacher: ${currentTeacher || 'Administrator'}</p>
          </div>
          
          <div style="display: flex; gap: 20px; margin-bottom: 30px;">
            <div style="flex:1; background: #f0fdf4; padding: 15px; border-radius: 10px; text-align: center;">
              <h3>Total Assessments</h3>
              <p style="font-size: 32px; font-weight: bold; color: #06b6d4;">${allQuizzes.length}</p>
            </div>
            <div style="flex:1; background: #eff6ff; padding: 15px; border-radius: 10px; text-align: center;">
              <h3>Total Submissions</h3>
              <p style="font-size: 32px; font-weight: bold; color: #06b6d4;">${allSubmissions.length}</p>
            </div>
            <div style="flex:1; background: #fef3c7; padding: 15px; border-radius: 10px; text-align: center;">
              <h3>Average Score</h3>
              <p style="font-size: 32px; font-weight: bold; color: #06b6d4;">${avg}%</p>
            </div>
            <div style="flex:1; background: #dcfce7; padding: 15px; border-radius: 10px; text-align: center;">
              <h3>Pass Rate</h3>
              <p style="font-size: 32px; font-weight: bold; color: #22c55e;">${passRate}%</p>
            </div>
          </div>
          
          <h2>📋 Detailed Submissions</h2>
          <table>
            <thead><tr><th>Student Name</th><th>Quiz Title</th><th>Score</th><th>Status</th><th>Date</th><th>Violations</th></tr></thead>
            <tbody>
              ${allSubmissions.map(s => `<tr><td>${s.studentName}</td><td>${s.quizTitle}</td><td class="${s.percentage>=50?'score-high':'score-low'}">${s.percentage}%</td><td>${s.percentage>=50?'Pass':'Fail'}</td><td>${s.date}</td><td>${s.violations||0}</td></tr>`).join('')}
            </tbody>
          </table>
          
          <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #ddd; text-align: center; font-size: 12px; color: #666;">
            <p>AfriQuiz Pro - Secure Assessment Platform | Generated by ${currentTeacher || 'AfriQuiz System'}</p>
          </div>
        </div>
      `;
      
      const element = document.createElement('div');
      element.innerHTML = reportHtml;
      document.body.appendChild(element);
      
      html2pdf().set({ margin: 1, filename: `afriquiz_report_${Date.now()}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } }).from(element).save().then(() => { document.body.removeChild(element); toast('PDF Report downloaded!'); });
    }
    
    function exportStudentPDF() {
      const studentName = prompt('Enter student name for PDF report:');
      if (!studentName) return;
      const studentSubs = allSubmissions.filter(s => s.studentName.toLowerCase().includes(studentName.toLowerCase()));
      if (!studentSubs.length) { toast('Student not found', 'error'); return; }
      
      const avg = Math.round(studentSubs.reduce((a,b)=>a+b.percentage,0)/studentSubs.length);
      const reportHtml = `
        <div class="pdf-report">
          <div class="header">
            <h1>📊 Student Performance Report</h1>
            <p>Student: ${studentName}</p>
            <p>Generated: ${new Date().toLocaleString()}</p>
          </div>
          
          <div style="background: #e0f2fe; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: center;">
            <h3>Overall Performance</h3>
            <p style="font-size: 48px; font-weight: bold; color: #06b6d4;">${avg}%</p>
            <p>Average Score across ${studentSubs.length} assessments</p>
          </div>
          
          <h2>📋 Assessment History</h2>
          <table>
            <thead><tr><th>Quiz Title</th><th>Score</th><th>Status</th><th>Date</th><th>Violations</th></tr></thead>
            <tbody>
              ${studentSubs.map(s => `<tr><td>${s.quizTitle}</td><td class="${s.percentage>=50?'score-high':'score-low'}">${s.percentage}%</td><td>${s.percentage>=50?'Pass':'Fail'}</td><td>${s.date}</td><td>${s.violations||0}</td></tr>`).join('')}
            </tbody>
          </table>
          
          <div style="margin-top: 30px; text-align: center; font-size: 12px; color: #666;">
            <p>AfriQuiz Pro - Secure Assessment Platform</p>
          </div>
        </div>
      `;
      
      const element = document.createElement('div');
      element.innerHTML = reportHtml;
      document.body.appendChild(element);
      html2pdf().set({ margin: 1, filename: `${studentName}_report_${Date.now()}.pdf`, html2canvas: { scale: 2 } }).from(element).save().then(() => { document.body.removeChild(element); toast('Student PDF report downloaded!'); });
    }
    
    // ==================== MEDIA UPLOAD ====================
    function handleMediaUpload(questionIdx, type) {
      const input = document.createElement('input');
      input.type = 'file';
      if (type === 'image') input.accept = 'image/*';
      else if (type === 'video') input.accept = 'video/*';
      else if (type === 'audio') input.accept = 'audio/*';
      else input.accept = '.pdf,.docx,.txt,.jpg,.png,.mp4,.mp3';
      
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            questionsList[questionIdx].media = { type: type, data: event.target.result, name: file.name };
            renderQuestionsEditor();
            toast(`Attachment added: ${file.name}`);
          };
          reader.readAsDataURL(file);
        }
      };
      input.click();
    }
    
    function removeMedia(questionIdx) {
      questionsList[questionIdx].media = null;
      renderQuestionsEditor();
      toast('Attachment removed');
    }
    
    // ==================== NAVIGATION ====================
    function showPage(page) { document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden')); const el = document.getElementById('page-' + page); if (el) el.classList.remove('hidden'); if (page === 'student-portal') loadStudentDashboard(); if (page === 'teacher-dashboard') loadTeacherDashboard(); }
    
    // ==================== RENDER APP ====================
    function renderApp() {
      document.getElementById('app').innerHTML = `
        <div class="h-full">
          <div id="anti-cheat-modal" class="hidden fixed inset-0 z-[10000]"><div class="fixed inset-0 bg-black/95"></div><div class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-red-950/95 border-2 border-red-500 rounded-2xl p-8 max-w-md text-center z-[10001]"><i data-lucide="alert-triangle" class="w-16 h-16 text-red-500 mx-auto mb-4"></i><h3 class="text-2xl font-bold text-red-500 mb-3">⚠️ Academic Integrity Alert</h3><p class="text-slate-300 text-sm mb-6" id="cheat-message"></p><button onclick="handleCheatAcknowledge()" class="btn-primary px-6 py-3 rounded-lg">I Understand</button></div></div>
          
          <div id="page-landing" class="fade-in min-h-screen">
            <nav class="glass sticky top-0 z-50 px-6 py-4 flex items-center justify-between"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-xl btn-primary flex items-center justify-center animate-pulse">🎓</div><span class="font-bold text-xl">AfriQuiz<span class="text-cyan-400">Pro</span></span></div><div class="flex gap-3"><div class="theme-switch ${!darkMode ? 'active' : ''}" onclick="toggleTheme()"><div class="slider"></div></div><button onclick="showPage('teacher-login')" class="btn-secondary px-5 py-2 rounded-lg text-sm font-semibold">👨‍🏫 Teacher</button><button onclick="showPage('student-verify')" class="btn-primary px-5 py-2 rounded-lg text-sm font-semibold">👨‍🎓 Student</button></div></nav>
            <div class="motivation-bar py-3 text-center text-sm"><span id="motivation-quote" class="italic">📚 Education is the passport to the future!</span></div>

    function handleTeacherLogin(e) { e.preventDefault(); if (document.getElementById('teacherPass').value !== 'teacher') { toast('Invalid code', 'error'); return; } currentTeacher = document.getElementById('teacherName').value.trim(); showPage('teacher-dashboard'); showTeacherTab('quizzes'); toast('Welcome, ' + currentTeacher); }
    function logoutTeacher() { currentTeacher = null; showPage('landing'); }
    function loadTeacherDashboard() { showTeacherTab('quizzes'); }
    function showTeacherTab(tab) { document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active')); document.querySelector(`[data-tab="${tab}"]`)?.classList.add('active'); const c = document.getElementById('teacherContent'); if (tab === 'quizzes') renderQuizzesList(c); if (tab === 'create') renderCreateForm(c); if (tab === 'submissions') renderSubmissionsTable(c); if (tab === 'analytics') renderAnalytics(c); if (tab === 'leaderboard') renderLeaderboard(c); if (tab === 'reports') renderReportsPanel(c); }
    
    function renderReportsPanel(c) {
      c.innerHTML = `

            <button onclick="exportQuizzesJSON()" class="btn-secondary p-4 rounded-xl text-center">💾 Backup Quizzes (JSON)</button>
          </div>
        </div>
      `;

    function exportAllSubmissionsCSV() { let csv = "Student,Class,Quiz,Score,Status,Date,Violations\n"; allSubmissions.forEach(s => csv += `"${s.studentName}","${s.studentClass}","${s.quizTitle}",${s.percentage},${s.percentage>=50?"Pass":"Fail"},"${s.date}",${s.violations||0}\n`); const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv])); a.download = `submissions_${Date.now()}.csv`; a.click(); toast('CSV exported'); }
    function exportQuizzesJSON() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(allQuizzes, null, 2)])); a.download = `quizzes_backup_${Date.now()}.json`; a.click(); toast('Backup saved'); }
    
    function renderQuizzesList(c) { if (!allQuizzes.length) { c.innerHTML = `<div class="glass rounded-2xl p-12 text-center"><button onclick="showTeacherTab('create')" class="btn-primary mt-4 px-6 py-2">Create First Assessment</button></div>`; return; } c.innerHTML = `<div class="grid gap-4">${allQuizzes.map(q => `<div class="glass rounded-2xl p-6 border-l-4 border-cyan-500"><div><h3 class="font-bold text-xl">${q.title}</h3><p class="text-slate-400 text-sm">${q.subject} • ${q.questions.length} Qs • Pass: ${q.passing_mark}% • Max Retakes: ${q.max_retakes || 2}</p><div class="flex gap-2 mt-2"><span class="text-xs font-mono bg-cyan-500/20 px-2 py-1 rounded">Code: ${q.code}</span><button onclick="copyCode('${q.code}')" class="text-cyan-400 text-xs">📋 Copy</button></div></div><div class="flex gap-2 mt-3"><button onclick="editAssessment('${q.id}')" class="btn-secondary px-3 py-2 rounded-lg text-sm">✏️ Edit</button><button onclick="deleteAssessment('${q.id}')" class="text-red-400 px-3 py-2 text-sm">🗑️ Delete</button></div></div>`).join('')}</div>`; }
    function copyCode(code) { navigator.clipboard.writeText(code); toast('Code copied: ' + code); }
    function deleteAssessment(id) { if (confirm('Delete assessment?')) { allQuizzes = allQuizzes.filter(q => q.id !== id); saveQuizzes(); renderQuizzesList(document.getElementById('teacherContent')); toast('Deleted'); } }
    
    function editAssessment(id) { const quiz = allQuizzes.find(q => q.id === id); if (!quiz) return; editingQuizId = id; questionsList = JSON.parse(JSON.stringify(quiz.questions)); showTeacherTab('create'); setTimeout(() => { document.getElementById('edit-title').value = quiz.title; document.getElementById('edit-subject').value = quiz.subject; document.getElementById('edit-passing').value = quiz.passing_mark; document.getElementById('edit-time').value = quiz.time_limit; document.getElementById('edit-retakes').value = quiz.max_retakes || 2; document.getElementById('edit-rules').value = quiz.rules || ''; document.getElementById('edit-footer').value = quiz.footer || ''; renderQuestionsEditor(); }, 100); }
    
    function renderQuestionsEditor() { const container = document.getElementById('questions-editor'); if (!container) return; if (!questionsList.length) { container.innerHTML = '<div class="text-center py-8">No questions. Add some!</div>'; return; } container.innerHTML = questionsList.map((q, idx) => `<div class="glass-light rounded-xl p-5 mb-4"><div class="flex justify-between"><span class="text-xs font-bold text-cyan-400">${q.type} #${idx+1}</span><button onclick="removeQuestionItem(${idx})" class="text-red-400">✖</button></div><textarea class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 mb-2" placeholder="Question text" data-field="text" data-idx="${idx}">${escapeHtml(q.text)}</textarea><div class="media-upload-btn" onclick="handleMediaUpload(${idx}, 'image')">📷 Add Image</div><div class="media-upload-btn" onclick="handleMediaUpload(${idx}, 'video')">🎥 Add Video</div><div class="media-upload-btn" onclick="handleMediaUpload(${idx}, 'audio')">🎵 Add Audio</div><div class="media-upload-btn" onclick="handleMediaUpload(${idx}, 'file')">📎 Add PDF/Document</div>${q.media ? `<div class="mt-2 p-2 bg-cyan-500/20 rounded flex justify-between"><span>📎 ${q.media.name}</span><button onclick="removeMedia(${idx})" class="text-red-400 text-xs">Remove</button></div>` : ''}${q.type === 'multiple' ? `<div>${[0,1,2,3].map(i => `<input type="text" class="w-full mb-1 bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-1" placeholder="Option ${String.fromCharCode(65+i)}" data-field="opt${i}" data-idx="${idx}" value="${escapeHtml(q.options[i] || '')}">`).join('')}</div><div class="flex gap-2 mt-2"><input type="number" min="1" max="4" class="w-20 bg-slate-800/50 border border-slate-700 rounded-lg px-2 py-1" placeholder="Correct (1-4)" data-field="correct" data-idx="${idx}" value="${(q.correct||0)+1}"><input type="number" min="1" class="w-20 bg-slate-800/50 border border-slate-700 rounded-lg px-2 py-1" placeholder="Points" data-field="points" data-idx="${idx}" value="${q.points||1}"></div>` : q.type === 'truefalse' ? `<div class="flex gap-2 mt-2"><select class="bg-slate-800/50 border border-slate-700 rounded-lg px-2 py-1" data-field="correct" data-idx="${idx}"><option value="0" ${q.correct===0?'selected':''}>True</option><option value="1" ${q.correct===1?'selected':''}>False</option></select><input type="number" min="1" class="w-20 bg-slate-800/50 border border-slate-700 rounded-lg px-2 py-1" placeholder="Points" data-field="points" data-idx="${idx}" value="${q.points||1}"></div>` : `<div><input type="text" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-1" placeholder="Keywords for grading" data-field="correct" data-idx="${idx}" value="${escapeHtml(q.correct||'')}"><input type="number" min="1" class="w-20 mt-2 bg-slate-800/50 border border-slate-700 rounded-lg px-2 py-1" placeholder="Points" data-field="points" data-idx="${idx}" value="${q.points||1}"></div>`}</div>`).join(''); }
    
    window.removeQuestionItem = (idx) => { questionsList.splice(idx, 1); renderQuestionsEditor(); };
    function addNewQuestion(type) { questionsList.push({ type, text: '', options: type === 'multiple' ? ['','','',''] : [], correct: 0, points: 1, media: null }); renderQuestionsEditor(); }
    function saveQuestionsFromEditor() { for (let i = 0; i < questionsList.length; i++) { const q = questionsList[i]; q.text = document.querySelector(`[data-field="text"][data-idx="${i}"]`)?.value || ''; if (q.type === 'multiple') { q.options = [0,1,2,3].map(j => document.querySelector(`[data-field="opt${j}"][data-idx="${i}"]`)?.value || ''); q.correct = (parseInt(document.querySelector(`[data-field="correct"][data-idx="${i}"]`)?.value) || 1) - 1; q.points = parseInt(document.querySelector(`[data-field="points"][data-idx="${i}"]`)?.value) || 1; } else if (q.type === 'truefalse') { q.correct = parseInt(document.querySelector(`[data-field="correct"][data-idx="${i}"]`)?.value) || 0; q.points = parseInt(document.querySelector(`[data-field="points"][data-idx="${i}"]`)?.value) || 1; } else { q.correct = document.querySelector(`[data-field="correct"][data-idx="${i}"]`)?.value || ''; q.points = parseInt(document.querySelector(`[data-field="points"][data-idx="${i}"]`)?.value) || 1; } } }
    
    function renderCreateForm(c) { c.innerHTML = `<div class="glass rounded-2xl p-8 max-w-4xl mx-auto"><h2 class="text-3xl font-bold mb-2">📝 Create Assessment</h2><form onsubmit="saveAssessment(event)"><div class="grid md:grid-cols-2 gap-4 mb-4"><input id="edit-title" type="text" placeholder="Title" required class="bg-slate-800/50 border-2 border-slate-700 rounded-xl px-4 py-3"><input id="edit-subject" type="text" placeholder="Subject" required class="bg-slate-800/50 border-2 border-slate-700 rounded-xl px-4 py-3"><input id="edit-passing" type="number" placeholder="Passing Mark %" value="50" class="bg-slate-800/50 border-2 border-slate-700 rounded-xl px-4 py-3"><input id="edit-time" type="number" placeholder="Time (minutes)" value="30" class="bg-slate-800/50 border-2 border-slate-700 rounded-xl px-4 py-3"><input id="edit-retakes" type="number" placeholder="Max Retakes" value="2" class="bg-slate-800/50 border-2 border-slate-700 rounded-xl px-4 py-3"></div><textarea id="edit-rules" rows="2" placeholder="Exam Rules" class="w-full bg-slate-800/50 border-2 border-slate-700 rounded-xl px-4 py-3 mb-4"></textarea><textarea id="edit-footer" rows="2" placeholder="Footer" class="w-full bg-slate-800/50 border-2 border-slate-700 rounded-xl px-4 py-3 mb-4"></textarea><div id="questions-editor" class="space-y-4 mb-4"></div><div class="flex flex-wrap gap-2 mb-4"><button type="button" onclick="addNewQuestion('multiple')" class="btn-secondary px-3 py-1 text-sm">+ Multiple Choice</button><button type="button" onclick="addNewQuestion('truefalse')" class="btn-secondary px-3 py-1 text-sm">+ True/False</button><button type="button" onclick="addNewQuestion('short')" class="btn-secondary px-3 py-1 text-sm">+ Short Answer</button></div><div class="flex gap-4"><button type="submit" class="btn-primary px-8 py-3 rounded-xl font-bold">Save</button><button type="button" onclick="showTeacherTab('quizzes')" class="btn-secondary px-8 py-3 rounded-xl">Cancel</button></div></form></div>`; if (questionsList.length) renderQuestionsEditor(); }
    
    function saveAssessment(e) { e.preventDefault(); saveQuestionsFromEditor(); if (questionsList.length === 0) { toast('Add at least one question', 'error'); return; } const assessment = { id: editingQuizId || Date.now().toString(36), title: document.getElementById('edit-title').value, subject: document.getElementById('edit-subject').value, code: editingQuizId ? allQuizzes.find(q=>q.id===editingQuizId)?.code : Math.random().toString(36).substring(2,8).toUpperCase(), passing_mark: parseInt(document.getElementById('edit-passing').value), time_limit: parseInt(document.getElementById('edit-time').value), max_retakes: parseInt(document.getElementById('edit-retakes').value) || 2, rules: document.getElementById('edit-rules').value, footer: document.getElementById('edit-footer').value, questions: [...questionsList] }; if (editingQuizId) { allQuizzes = allQuizzes.map(q => q.id === editingQuizId ? assessment : q); toast('Updated'); } else { allQuizzes.push(assessment); toast('Created! Code: ' + assessment.code); } saveQuizzes(); editingQuizId = null; questionsList = []; showTeacherTab('quizzes'); }
    
    function renderSubmissionsTable(c) { if (!allSubmissions.length) { c.innerHTML = '<div class="glass rounded-2xl p-12 text-center"><p>No submissions yet</p></div>'; return; } c.innerHTML = `<div class="glass rounded-2xl overflow-hidden"><div class="p-4 border-b"><h2 class="font-bold">Submissions</h2></div><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr><th class="px-4 py-3">Student</th><th>Quiz</th><th>Score</th><th>Status</th><th>Violations</th></thead><tbody>${allSubmissions.map(s => `<td><td class="px-4 py-3">${s.studentName}</td><td>${s.quizTitle}</td><td class="font-bold ${s.percentage>=50?'text-green-400':'text-red-400'}">${s.percentage}%</td><td><span class="px-2 py-1 rounded text-xs ${s.percentage>=50?'bg-green-500/20':'bg-red-500/20'}">${s.percentage>=50?'Pass':'Fail'}</span></td><td>${s.violations||0}</td></tr>`).join('')}</tbody></table></div></div>`; }
    
    function renderAnalytics(c) { const avg = allSubmissions.length ? Math.round(allSubmissions.reduce((a,b)=>a+b.percentage,0)/allSubmissions.length) : 0; c.innerHTML = `<div class="grid md:grid-cols-4 gap-4 mb-6"><div class="glass rounded-2xl p-6"><p class="text-slate-400 text-xs">Assessments</p><p class="text-4xl font-bold">${allQuizzes.length}</p></div><div class="glass rounded-2xl p-6"><p class="text-slate-400 text-xs">Submissions</p><p class="text-4xl font-bold">${allSubmissions.length}</p></div><div class="glass rounded-2xl p-6"><p class="text-slate-400 text-xs">Avg Score</p><p class="text-4xl font-bold text-cyan-400">${avg}%</p></div><div class="glass rounded-2xl p-6"><p class="text-slate-400 text-xs">Pass Rate</p><p class="text-4xl font-bold text-green-400">${allSubmissions.length?Math.round(allSubmissions.filter(s=>s.percentage>=50).length/allSubmissions.length*100):0}%</p></div></div><div class="glass rounded-2xl p-6"><h3 class="font-bold mb-4">Score Distribution</h3><canvas id="analyticsChart" height="200"></canvas></div>`; const ctx = document.getElementById('analyticsChart')?.getContext('2d'); if (ctx) { const dist = [0,0,0,0,0]; allSubmissions.forEach(s => { const i = Math.min(4, Math.floor(s.percentage/20)); dist[i]++; }); new Chart(ctx, { type: 'bar', data: { labels: ['0-20%','21-40%','41-60%','61-80%','81-100%'], datasets: [{ label: 'Students', data: dist, backgroundColor: '#06b6d4' }] } }); } }
    
    function renderLeaderboard(c) { const studentScores = {}; allSubmissions.forEach(s => { if (!studentScores[s.studentName]) studentScores[s.studentName] = { total: 0, count: 0 }; studentScores[s.studentName].total += s.percentage; studentScores[s.studentName].count++; }); const ranked = Object.entries(studentScores).map(([name, data]) => ({ name, avg: data.total/data.count })).sort((a,b)=>b.avg - a.avg).slice(0,10); c.innerHTML = `<div class="glass rounded-2xl p-6"><h2 class="text-2xl font-bold mb-4">🏆 Top Students</h2><div class="space-y-2">${ranked.map((s, i) => `<div class="flex justify-between items-center p-3 rounded-lg ${i===0?'bg-yellow-500/20':i===1?'bg-gray-400/20':i===2?'bg-orange-500/20':'glass-light'}"><span class="font-bold">${i+1}. ${s.name}</span><span class="text-cyan-400">${Math.round(s.avg)}% avg</span></div>`).join('')}</div></div>`; }
    
    // ==================== STUDENT FUNCTIONS ====================
    function handleStudentVerify(e) { e.preventDefault(); currentStudent = { name: document.getElementById('studentName').value.trim(), class: document.getElementById('studentClass').value.trim(), sdms: document.getElementById('studentSDMS').value.trim() }; showPage('student-portal'); loadStudentDashboard(); toast('Welcome, ' + currentStudent.name); }
    function logoutStudent() { if (isExamActive) deactivateExamSecurity(); currentStudent = null; showPage('landing'); }
    
    function loadStudentDashboard() { const c = document.getElementById('studentPortalContent'); document.getElementById('studentPortalName').textContent = currentStudent?.name || ''; c.innerHTML = `<div class="max-w-4xl mx-auto"><div class="glass rounded-2xl p-8 mb-6"><h2 class="text-2xl font-bold mb-4">🔐 Join Assessment</h2><form onsubmit="joinByCode(event)" class="flex gap-3"><input id="joinCode" type="text" maxlength="6" placeholder="Enter code" class="flex-1 bg-slate-800/50 border-2 border-slate-700 rounded-xl px-5 py-4 uppercase"><button type="submit" class="btn-primary px-8 py-4 rounded-xl font-bold">Join</button></form></div><h3 class="font-bold text-xl mb-4">📚 Available Assessments</h3><div id="availableQuizzesList"></div><h3 class="font-bold text-xl mb-4 mt-8">📊 My Results</h3><div id="myResultsList"></div></div>`; const takenIds = allSubmissions.filter(s=>s.sdmsCode===currentStudent?.sdms).map(s=>s.quizId); const available = allQuizzes.filter(q => { const retakeCount = allSubmissions.filter(s=>s.sdmsCode===currentStudent?.sdms && s.quizId===q.id).length; return !takenIds.includes(q.id) || retakeCount < (q.max_retakes || 2); }); document.getElementById('availableQuizzesList').innerHTML = available.length ? available.map(q => `<div class="glass rounded-2xl p-5 flex justify-between items-center"><div><p class="font-bold">${q.title}</p><p class="text-sm">${q.subject} • ${q.questions.length} Qs • ${q.time_limit} min</p></div><button onclick="startExam('${q.id}')" class="btn-primary px-6 py-3 rounded-xl">Start Exam</button></div>`).join('') : '<div class="glass rounded-2xl p-8 text-center">No available assessments</div>'; const myResults = allSubmissions.filter(s => s.sdmsCode === currentStudent?.sdms); document.getElementById('myResultsList').innerHTML = myResults.length ? myResults.map(s => `<div class="glass-light rounded-xl p-4 flex justify-between"><div><p class="font-bold">${s.quizTitle}</p><p class="text-xs">${s.date}</p></div><div class="text-right"><p class="font-bold text-lg ${s.percentage>=50?'text-green-400':'text-red-400'}">${s.percentage}%</p></div></div>`).join('') : '<div class="glass rounded-2xl p-8 text-center">No results yet</div>'; }
    
    function joinByCode(e) { e.preventDefault(); const code = document.getElementById('joinCode').value.trim().toUpperCase(); const quiz = allQuizzes.find(q=>q.code===code); if (quiz) startExam(quiz.id); else toast('Invalid code', 'error'); }
    
    function startExam(quizId) { const retakeCount = allSubmissions.filter(s => s.sdmsCode === currentStudent?.sdms && s.quizId === quizId).length; const quiz = allQuizzes.find(q => q.id === quizId); if (retakeCount >= (quiz.max_retakes || 2)) { toast(`Max retakes (${quiz.max_retakes}) reached`, 'error'); return; } currentQuiz = quiz; currentQuestionIdx = 0; studentAnswers = new Array(currentQuiz.questions.length).fill(null); violationLogs = []; examLocked = false; if (timerInterval) clearInterval(timerInterval); document.getElementById('quizTitleDisplay').textContent = currentQuiz.title; document.getElementById('violationCount').textContent = '0'; if (currentQuiz.time_limit > 0) startTimer(currentQuiz.time_limit * 60); activateExamSecurity(); showPage('quiz-taking'); renderExamQuestion(); toast('🔒 Exam security active.'); }
    
    function startTimer(seconds) { timeRemaining = seconds; updateTimerDisplay(); timerInterval = setInterval(() => { if (timeRemaining > 0) { timeRemaining--; updateTimerDisplay(); } if (timeRemaining <= 0) { clearInterval(timerInterval); toast("Time's up!"); setTimeout(() => submitQuiz(), 500); } }, 1000); }
    function updateTimerDisplay() { const m = Math.floor(timeRemaining/60), s = timeRemaining%60; const el = document.getElementById('timerDisplay'); if (el) el.textContent = `${m}:${s.toString().padStart(2,'0')}`; if (timeRemaining <= 60) el?.classList.add('text-red-400', 'animate-pulse'); }
    
    function renderExamQuestion() { const q = currentQuiz.questions[currentQuestionIdx]; const total = currentQuiz.questions.length; document.getElementById('quizProgressDisplay').textContent = `Question ${currentQuestionIdx+1} of ${total}`; let mediaHtml = ''; if (q.media) { if (q.media.type === 'image') mediaHtml = `<img src="${q.media.data}" class="media-preview my-3">`; else if (q.media.type === 'video') mediaHtml = `<video controls class="media-preview my-3"><source src="${q.media.data}"></video>`; else if (q.media.type === 'audio') mediaHtml = `<audio controls class="my-3"><source src="${q.media.data}"></audio>`; else mediaHtml = `<a href="${q.media.data}" target="_blank" class="text-cyan-400 underline">📎 ${q.media.name}</a>`; } let html = `<div class="glass-strong rounded-2xl p-8"><div class="border-b pb-4 mb-4"><h2 class="text-2xl font-bold">${currentQuiz.title}</h2><p class="text-slate-400">${currentQuiz.subject}</p></div><div class="bg-cyan-500/10 p-4 rounded-lg mb-4"><p class="text-sm">${currentQuiz.rules || 'Standard rules'}</p></div><div class="mb-4"><span class="text-xs text-cyan-400">Question ${currentQuestionIdx+1}</span><span class="ml-4 px-2 py-1 bg-purple-500/20 rounded text-xs">${q.points} marks</span><p class="text-lg font-semibold mt-2">${escapeHtml(q.text)}</p>${mediaHtml}</div>`; if (q.type === 'multiple') { html += `<div class="space-y-3">${q.options.map((opt,i)=>`<button onclick="selectAnswer(${i})" class="quiz-option w-full text-left px-5 py-3 rounded-xl border ${studentAnswers[currentQuestionIdx]===i?'selected':''}"><span class="font-bold text-cyan-400 mr-3">${String.fromCharCode(65+i)}</span>${escapeHtml(opt)}</button>`).join('')}</div>`; } else if (q.type === 'truefalse') { html += `<div class="flex gap-4">${['True','False'].map((opt,i)=>`<button onclick="selectAnswer(${i})" class="quiz-option flex-1 py-3 rounded-xl border text-center ${studentAnswers[currentQuestionIdx]===i?'selected':''}">${opt}</button>`).join('')}</div>`; } else { html += `<textarea class="w-full bg-slate-800/50 border-2 border-slate-700 rounded-xl px-5 py-4 h-32" placeholder="Type your answer..." oninput="studentAnswers[currentQuestionIdx]=this.value">${escapeHtml(studentAnswers[currentQuestionIdx]||'')}</textarea>`; } html += `<div class="mt-6 pt-4 border-t text-center text-xs text-slate-500">${currentQuiz.footer}</div></div>`; document.getElementById('quizQuestionContainer').innerHTML = html; document.getElementById('prevBtn').classList.toggle('hidden', currentQuestionIdx===0); document.getElementById('nextBtn').classList.toggle('hidden', currentQuestionIdx===total-1); document.getElementById('submitBtn').classList.toggle('hidden', currentQuestionIdx!==total-1); if (typeof lucide !== 'undefined') lucide.createIcons(); }
    
    window.selectAnswer = (i) => { studentAnswers[currentQuestionIdx] = i; renderExamQuestion(); };
    window.nextQuestion = () => { if (currentQuestionIdx < currentQuiz.questions.length-1) { currentQuestionIdx++; renderExamQuestion(); } };
    window.prevQuestion = () => { if (currentQuestionIdx > 0) { currentQuestionIdx--; renderExamQuestion(); } };
    
    function submitQuiz() { clearInterval(timerInterval); let earned = 0, total = 0; currentQuiz.questions.forEach((q, i) => { total += q.points; const userAnswer = studentAnswers[i]; if (q.type === 'short') { const correct = (q.correct || '').toLowerCase().trim(); const user = (userAnswer || '').toLowerCase().trim(); if (correct && (user === correct || user.includes(correct))) earned += q.points; } else if (userAnswer === q.correct) earned += q.points; }); const percentage = total ? Math.round((earned/total)*100) : 0; const passed = percentage >= (currentQuiz.passing_mark||50); const submission = { id: Date.now().toString(), studentName: currentStudent.name, studentClass: currentStudent.class, sdmsCode: currentStudent.sdms, quizId: currentQuiz.id, quizTitle: currentQuiz.title, percentage, date: new Date().toLocaleString(), timeTaken: currentQuiz.time_limit ? `${currentQuiz.time_limit - Math.ceil(timeRemaining/60)} min` : 'N/A', violations: violationLogs.length }; allSubmissions.push(submission); saveSubmissions(); if (passed) showConfetti(); deactivateExamSecurity(); document.getElementById('resultQuizName').textContent = currentQuiz.title; document.getElementById('resultScore').textContent = percentage+'%'; document.getElementById('resultIcon').innerHTML = `<i data-lucide="${passed?'trophy':'alert-circle'}" class="w-12 h-12 ${passed?'text-green-400':'text-red-400'}"></i>`; document.getElementById('resultStatus').innerHTML = passed ? '🎉 Congratulations! You Passed!' : '📚 Keep Practicing!'; document.getElementById('resultFeedback').innerHTML = `<p>Score: ${percentage}%</p><p>${percentage>=80?'Excellent! 🌟':percentage>=60?'Good effort! 💪':'Review weak areas 📖'}</p><p class="text-xs mt-2">Violations: ${violationLogs.length}</p>`; showPage('quiz-result'); if (typeof lucide !== 'undefined') lucide.createIcons(); }
    
    function toggleTheme() { darkMode = !darkMode; document.body.classList.toggle('light-mode', !darkMode); localStorage.setItem('afriquiz_theme', darkMode ? 'dark' : 'light'); toast(darkMode ? 'Dark mode enabled' : 'Light mode enabled'); }
    function loadTheme() { const saved = localStorage.getItem('afriquiz_theme'); if (saved === 'light') { darkMode = false; document.body.classList.add('light-mode'); } }
    
    // ==================== INITIALIZE ====================
    generateParticles();
    loadQuizzes();
    loadSubmissions();
    loadTheme();
    renderApp();
    
    window.handleCheatAcknowledge = handleCheatAcknowledge;
    window.handleMediaUpload = handleMediaUpload;
    window.removeMedia = removeMedia;
    window.addNewQuestion = addNewQuestion;
    window.saveAssessment = saveAssessment;
    window.editAssessment = editAssessment;
    window.deleteAssessment = deleteAssessment;
    window.copyCode = copyCode;
    window.exportPDFReport = exportPDFReport;
    window.exportStudentPDF = exportStudentPDF;
    window.exportAllSubmissionsCSV = exportAllSubmissionsCSV;
    window.exportQuizzesJSON = exportQuizzesJSON;
    window.joinByCode = joinByCode;
    window.startExam = startExam;
    window.showTeacherTab = showTeacherTab;
    window.showPage = showPage;
    window.handleTeacherLogin = handleTeacherLogin;
    window.handleStudentVerify = handleStudentVerify;
    window.logoutTeacher = logoutTeacher;
    window.logoutStudent = logoutStudent;
    window.loadStudentDashboard = loadStudentDashboard;
    window.submitQuiz = submitQuiz;
    window.selectAnswer = selectAnswer;
    window.nextQuestion = nextQuestion;
    window.prevQuestion = prevQuestion;
    window.removeQuestionItem = removeQuestionItem;
    window.toggleTheme = toggleTheme;
  </script>
</body>
</html>
