<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMENA Quiz - Rwandan Teaching Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
        }
        
        .flag {
            text-align: center;
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .logo h1 {
            text-align: center;
            font-size: 32px;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .logo p {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .toggle {
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            cursor: pointer;
            font-weight: 500;
        }
        
        .toggle:hover {
            text-decoration: underline;
        }
        
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }
        
        .error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }
        
        .success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="flag">🇷🇼</div>
        <div class="logo">
            <h1>IMENA Quiz</h1>
            <p>Uburezi bw'Imena - Quality Education Platform</p>
        </div>
        
        <div id="loginForm">
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="loginEmail" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>🔒 Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>👥 I am a</label>
                <select id="loginRole">
                    <option value="teacher">👨‍🏫 Teacher (Mwarimu)</option>
                    <option value="student">👨‍🎓 Student (Umwarimu)</option>
                </select>
            </div>
            <button onclick="handleLogin()">🔐 Login</button>
            <div class="toggle" onclick="showSignup()">✨ New here? Create Account</div>
        </div>
        
        <div id="signupForm" style="display: none;">
            <div class="form-group">
                <label>👤 Full Name</label>
                <input type="text" id="signupName" placeholder="e.g., Jean Paul">
            </div>
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="signupEmail" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>🔒 Password</label>
                <input type="password" id="signupPassword" placeholder="•••••••• (min 6 chars)">
            </div>
            <div class="form-group">
                <label>🏫 School (Optional)</label>
                <input type="text" id="signupSchool" placeholder="Your school name">
            </div>
            <div class="form-group">
                <label>👥 I am a</label>
                <select id="signupRole">
                    <option value="teacher">👨‍🏫 Teacher</option>
                    <option value="student">👨‍🎓 Student</option>
                </select>
            </div>
            <button onclick="handleSignup()">📝 Create Account</button>
            <div class="toggle" onclick="showLogin()">← Back to Login</div>
        </div>
        
        <div id="message"></div>
    </div>

    <script>
        // Supabase configuration - YOUR ACTUAL KEYS
        const SUPABASE_URL = 'https://yakusekcvidtvgcbbeap.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_s0CWHnbcqVTVHScSM4dMGQ_GYliBfEu';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = `<div class="message ${type}">${msg}</div>`;
            setTimeout(() => msgDiv.innerHTML = '', 5000);
        }
        
        function showSignup() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
            document.getElementById('message').innerHTML = '';
        }
        
        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('message').innerHTML = '';
        }
        
        async function handleSignup() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const role = document.getElementById('signupRole').value;
            const school = document.getElementById('signupSchool').value;
            
            if (!name || !email || !password) {
                showMessage('Please fill all required fields!', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }
            
            try {
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });
                
                if (authError) throw authError;
                
                if (authData.user) {
                    const { error: profileError } = await supabase
                        .from('profiles')
                        .insert([{
                            id: authData.user.id,
                            name: name,
                            role: role,
                            school: school || null
                        }]);
                    
                    if (profileError) throw profileError;
                    
                    showMessage('✅ Account created successfully! Please login.', 'success');
                    setTimeout(() => {
                        showLogin();
                        document.getElementById('loginEmail').value = email;
                    }, 2000);
                }
            } catch (error) {
                showMessage('❌ Error: ' + error.message, 'error');
            }
        }
        
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const selectedRole = document.getElementById('loginRole').value;
            
            if (!email || !password) {
                showMessage('Please enter email and password', 'error');
                return;
            }
            
            try {
                const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (authError) throw authError;
                
                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', authData.user.id)
                    .single();
                
                if (profileError) throw profileError;
                
                if (profile.role !== selectedRole) {
                    await supabase.auth.signOut();
                    showMessage(`You registered as ${profile.role}. Please select correct role.`, 'error');
                    return;
                }
                
                localStorage.setItem('userId', authData.user.id);
                localStorage.setItem('userName', profile.name);
                localStorage.setItem('userRole', profile.role);
                
                showMessage('✅ Login successful! Redirecting...', 'success');
                
                setTimeout(() => {
                    window.location.href = profile.role === 'teacher' ? 'teacher.html' : 'student.html';
                }, 1000);
            } catch (error) {
                showMessage('❌ Login failed: ' + error.message, 'error');
            }
        }
        
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('role')
                    .eq('id', session.user.id)
                    .single();
                
                if (profile) {
                    window.location.href = profile.role === 'teacher' ? 'teacher.html' : 'student.html';
                }
            }
        }
        
        checkSession();
    </script>
</body>
</html>
