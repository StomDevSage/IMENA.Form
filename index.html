<!DOCTYPE html>
<html lang="en" class="h-full">
<head>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AfriQuiz Pro | Ultimate Secure Assessment Platform</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <style>
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
    html, body { height: 100%; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    
    /* Animated Gradient Background */
    body {
      background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      position: relative;
    }
    
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    /* Floating Particles Animation */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    
    .particle {
      position: absolute;
      background: rgba(6, 182, 212, 0.15);
      border-radius: 50%;
      animation: float 15s infinite linear;
    }
    
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }
    
    /* Glass Morphism Effects */
    .glass {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      z-index: 1;
    }
    
    .glass-light {
      background: rgba(30, 41, 59, 0.5);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.06);
    }
    
    .glass-strong {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(6, 182, 212, 0.3);
    }
    
    /* Button Styles */
    .btn-primary {
      background: linear-gradient(135deg, #06b6d4, #8b5cf6);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    .btn-primary::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    
    .btn-primary:hover::before {
      width: 300px;
      height: 300px;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(6,182,212,0.4);
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      transition: all 0.3s;
    }
    
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-1px);
    }
    
    /* Animations */
    .fade-in {
      animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .pulse {
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    /* Quiz Options */
    .quiz-option {
      transition: all 0.2s;
      cursor: pointer;
      border: 2px solid rgba(71, 85, 105, 0.5);
      position: relative;
      overflow: hidden;
    }
    
    .quiz-option::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(6,182,212,0.2), transparent);
      transition: left 0.5s;
    }
    
    .quiz-option:hover::before {
      left: 100%;
    }
    
    .quiz-option.selected {
      background: linear-gradient(135deg, rgba(6,182,212,0.25), rgba(139,92,246,0.15));
      border-color: #06b6d4;
      box-shadow: 0 0 20px rgba(6,182,212,0.4);
    }
    
    /* Toast Notifications */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 10000;
      animation: slideRight 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      background: #1e293b;
      border-radius: 12px;
      padding: 12px 20px;
      color: white;
      font-size: 14px;
      border-left: 4px solid #06b6d4;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(100px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    /* Input Focus Effects */
    input:focus, textarea:focus, select:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(6,182,212,0.3);
      border-color: #06b6d4;
    }
    
    /* Sidebar Links */
    .sidebar-link {
      transition: all 0.2s;
      cursor: pointer;
      position: relative;
    }
    
    .sidebar-link:hover, .sidebar-link.active {
      background: rgba(6,182,212,0.15);
      color: #06b6d4;
      transform: translateX(5px);
    }
    
    /* Timer Glow Effect */
    .timer-glow {
      animation: timerPulse 1s infinite;
    }
    
    @keyframes timerPulse {
      0%, 100% { text-shadow: 0 0 5px rgba(6,182,212,0.5); }
      50% { text-shadow: 0 0 20px rgba(6,182,212,0.8); }
    }
    
    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb {
      background: rgba(6,182,212,0.5);
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(6,182,212,0.8);
    }
    
    /* Motivational Quote Bar */
    .motivation-bar {
      background: linear-gradient(90deg, rgba(6,182,212,0.2), rgba(139,92,246,0.2), rgba(6,182,212,0.2));
      border-top: 1px solid rgba(6,182,212,0.3);
      border-bottom: 1px solid rgba(6,182,212,0.3);
    }
    
    /* Question Card Hover */
    .question-card {
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .question-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    
    /* Loading Spinner */
    .spinner {
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #06b6d4;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Confetti Canvas */
    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body class="text-slate-100">
  <canvas id="confetti-canvas"></canvas>

  <script>
    // ==================== PARTICLE GENERATION ====================
    function generateParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        const size = Math.random() * 8 + 2;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
        particle.style.opacity = Math.random() * 0.5 + 0.2;
        container.appendChild(particle);
      }
    }
    
    // ==================== CONFETTI EFFECT ====================
    function showConfetti() {
      const canvas = document.getElementById('confetti-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      
      const particles = [];
      for (let i = 0; i < 150; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          size: Math.random() * 8 + 4,
          speedY: Math.random() * 5 + 3,
          speedX: Math.random() * 2 - 1,
          color: `hsl(${Math.random() * 360}, 70%, 60%)`,
          rotation: Math.random() * 360,
          rotationSpeed: Math.random() * 10 - 5
        });
      }
      
      let animationId;
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let allFinished = true;
        
        particles.forEach(p => {
          if (p.y < canvas.height) {
            allFinished = false;
            p.y += p.speedY;
            p.x += p.speedX;
            p.rotation += p.rotationSpeed;
            
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation * Math.PI / 180);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
            ctx.restore();
          }
        });
        
        if (!allFinished) {
          animationId = requestAnimationFrame(animate);
        } else {
          cancelAnimationFrame(animationId);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }
      
      animate();
      setTimeout(() => {
        if (animationId) cancelAnimationFrame(animationId);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }, 5000);
    }
    
    // ==================== MOTIVATIONAL QUOTES ====================
    const motivationalQuotes = [

      const quoteBar = document.getElementById('motivation-quote');
      if (quoteBar) {
        currentQuoteIndex = (currentQuoteIndex + 1) % motivationalQuotes.length;
        quoteBar.textContent = motivationalQuotes[currentQuoteIndex];
      }

    setInterval(rotateMotivationalQuote, 5000);
    
    // ==================== DATA STORAGE ====================
    let allQuizzes = [];
    let allSubmissions = [];
    let currentTeacher = null;
    let currentStudent = null;
    let currentQuiz = null;

    let timeRemaining = 0;

    function toast(msg, type = 'success') {
      const div = document.createElement('div');
      div.className = 'toast';
      div.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : 'check-circle'}" class="w-4 h-4 inline mr-2"></i>${msg}`;
      document.body.appendChild(div);
      if (typeof lucide !== 'undefined') lucide.createIcons();
      setTimeout(() => div.remove(), 4000);
    }
    
    function saveQuizzes() {
      try {
        localStorage.setItem('afriquiz_quizzes', JSON.stringify(allQuizzes));
      } catch(e) {
        console.error('Save failed:', e);
        toast('Storage failed - may be full', 'error');
      }
    }
    
    function loadQuizzes() {
      try {
        const saved = localStorage.getItem('afriquiz_quizzes');
        if (saved && saved !== '[]' && saved !== 'null') {
          allQuizzes = JSON.parse(saved);
        } else {
          loadSampleQuizzes();
        }
      } catch(e) {
        console.error('Load failed:', e);
        loadSampleQuizzes();
      }
    }
    
    function saveSubmissions() { localStorage.setItem('afriquiz_submissions', JSON.stringify(allSubmissions)); }
    function loadSubmissions() { 
      const saved = localStorage.getItem('afriquiz_submissions');
      if (saved) allSubmissions = JSON.parse(saved);
    }

          { type: 'multiple', text: 'What is the powerhouse of the cell?', options: ['Nucleus', 'Mitochondria', 'Ribosome', 'Chloroplast'], correct: 1, points: 2 },

    // ==================== ENHANCED ANTI-CHEAT ====================
    function initAntiCheat() {
      document.addEventListener('contextmenu', (e) => { if (isExamActive) { e.preventDefault(); logViolation('Right-click'); return false; } });
      document.addEventListener('keydown', (e) => {
        if (!isExamActive) return;
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C' || e.key === 'J')) || (e.ctrlKey && e.key === 'u')) {
          e.preventDefault(); logViolation('DevTools Attempt');
        }
        if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'x' || e.key === 'v' || e.key === 's')) {
          e.preventDefault(); logViolation('Copy/Paste Attempt');
        }
        if (e.key === 'PrintScreen') {
          e.preventDefault(); logViolation('Screenshot Attempt');
        }
      });
      ['copy', 'cut', 'paste', 'keydown'].forEach(ev => {
        document.addEventListener(ev, (e) => { if (isExamActive) { e.preventDefault(); logViolation(ev); } });
      });
      document.addEventListener('visibilitychange', () => {
        if (isExamActive && document.hidden && !examLocked) {
          logViolation('Tab Switch');
          examLocked = true;
          showCheatWarning('⚠️ Tab switching detected. Exam security violation recorded.');
          setTimeout(() => { submitQuiz(); }, 3000);
        }
      });
    }
    
    function logViolation(reason) {
      violationLogs.push({ reason, timestamp: new Date().toISOString() });
      const badge = document.getElementById('violationCount');
      if (badge) {
        badge.textContent = violationLogs.length;
        if (violationLogs.length >= 3) {
          badge.classList.add('animate-pulse', 'text-red-400');
          toast('⚠️ Multiple violations detected! Exam may be terminated.', 'error');
        }
      }
    }
    
    function showCheatWarning(msg) {
      const modal = document.getElementById('anti-cheat-modal');
      if (modal) {
        document.getElementById('cheat-message').textContent = msg;
        modal.classList.remove('hidden');
      }
    }
    
    function handleCheatAcknowledge() {
      document.getElementById('anti-cheat-modal').classList.add('hidden');
      examLocked = false;
    }
    
    // ==================== NAVIGATION ====================

      if (el) el.classList.remove('hidden');
      if (page === 'student-portal') loadStudentDashboard();
      if (page === 'teacher-dashboard') loadTeacherDashboard();
    }

    // ==================== TEACHER FUNCTIONS ====================
    function handleTeacherLogin(e) {
      e.preventDefault();
      if (document.getElementById('teacherPass').value !== 'teacher') { toast('Invalid access code', 'error'); return; }
      currentTeacher = document.getElementById('teacherName').value.trim();
      showPage('teacher-dashboard');
      showTeacherTab('quizzes');
      toast('Welcome, ' + currentTeacher);
    }
    
    function logoutTeacher() { currentTeacher = null; showPage('landing'); }
    function loadTeacherDashboard() { showTeacherTab('quizzes'); }
    
    function showTeacherTab(tab) {
      document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`)?.classList.add('active');
      const container = document.getElementById('teacherContent');
      if (tab === 'quizzes') renderQuizzesList(container);
      if (tab === 'create') renderCreateForm(container);
      if (tab === 'submissions') renderSubmissionsTable(container);
      if (tab === 'analytics') renderAnalytics(container);
      if (tab === 'export') renderExportPanel(container);
    }
    
    function renderExportPanel(container) {
      container.innerHTML = `
        <div class="glass rounded-2xl p-8 max-w-4xl mx-auto">
          <h2 class="font-heading text-2xl font-bold mb-4">📎 Export Reports</h2>
          <p class="text-slate-400 mb-6">Download assessment data in multiple formats</p>
          <div class="grid md:grid-cols-2 gap-4">
            <button onclick="exportAllSubmissionsCSV()" class="btn-primary p-4 rounded-xl text-center">📊 Export All Submissions (CSV)</button>
            <button onclick="exportStudentReport()" class="btn-secondary p-4 rounded-xl text-center">👨‍🎓 Export Individual Student Report</button>
            <button onclick="printReport()" class="btn-secondary p-4 rounded-xl text-center">🖨️ Print Summary Report</button>
            <button onclick="exportQuizzesJSON()" class="btn-secondary p-4 rounded-xl text-center">💾 Backup Quizzes (JSON)</button>
          </div>
        </div>
      `;
    }
    
    function exportAllSubmissionsCSV() {
      let csv = "Student Name,Class,SDMS Code,Quiz Title,Score %,Status,Date,Time Taken,Violations\n";
      allSubmissions.forEach(s => {
        csv += `"${s.studentName}","${s.studentClass}","${s.sdmsCode}","${s.quizTitle}",${s.percentage},${s.percentage >= 50 ? "Pass" : "Fail"},"${s.date}","${s.timeTaken || 'N/A'}",${s.violations || 0}\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `afriquiz_submissions_${Date.now()}.csv`;
      a.click();
      toast('CSV exported successfully!');
    }
    
    function exportQuizzesJSON() {
      const data = JSON.stringify(allQuizzes, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `afriquiz_quizzes_backup_${Date.now()}.json`;
      a.click();
      toast('Quizzes backed up!');
    }
    
    function printReport() {
      const printWindow = window.open('', '_blank');
      printWindow.document.write(`
        <html><head><title>AfriQuiz Report</title><style>body{font-family:Arial;padding:20px;} table{border-collapse:collapse;width:100%} th,td{border:1px solid #ddd;padding:8px;text-align:left}</style></head>
        <body><h1>AfriQuiz Pro - Assessment Report</h1><p>Generated: ${new Date().toLocaleString()}</p>
        <h2>Submissions (${allSubmissions.length})</h2>
        <table><tr><th>Student</th><th>Quiz</th><th>Score</th><th>Date</th></tr>
        ${allSubmissions.map(s => `<tr><td>${s.studentName}</td><td>${s.quizTitle}</td><td>${s.percentage}%</td><td>${s.date}</td></tr>`).join('')}
        </table></body></html>
      `);
      printWindow.print();
    }
    
    function exportStudentReport() {
      const studentName = prompt("Enter student name to export report:");
      if (!studentName) return;
      const studentSubs = allSubmissions.filter(s => s.studentName.toLowerCase().includes(studentName.toLowerCase()));
      if (studentSubs.length === 0) { toast('Student not found', 'error'); return; }
      let csv = "Quiz Title,Score %,Status,Date,Violations\n";
      studentSubs.forEach(s => {
        csv += `"${s.quizTitle}",${s.percentage},${s.percentage >= 50 ? "Pass" : "Fail"},"${s.date}",${s.violations || 0}\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${studentName}_report_${Date.now()}.csv`;
      a.click();
      toast('Student report exported!');
    }
    
    function renderQuizzesList(container) {
      if (!allQuizzes.length) {
        container.innerHTML = `<div class="glass rounded-2xl p-12 text-center"><div class="text-6xl mb-4">📋</div><p class="text-lg">No assessments created yet</p><button onclick="showTeacherTab('create')" class="btn-primary mt-4 px-6 py-2 rounded-lg">Create First Assessment</button></div>`;
        return;
      }
      container.innerHTML = `<div class="grid gap-4">${allQuizzes.map(q => `
        <div class="glass rounded-2xl p-6 border-l-4 border-cyan-500 transform hover:scale-[1.02] transition-all duration-300">
          <div class="flex items-start justify-between flex-wrap gap-3">
            <div><h3 class="font-bold text-xl">${q.title}</h3><p class="text-slate-400 text-sm">${q.subject} • ${q.questions.length} questions • Pass: ${q.passing_mark}% • Time: ${q.time_limit} min</p>
            <div class="flex gap-2 mt-2"><span class="text-xs font-mono bg-cyan-500/20 px-2 py-1 rounded text-cyan-400">Code: ${q.code}</span><button onclick="copyCode('${q.code}')" class="text-cyan-400 text-xs hover:underline">📋 Copy</button></div></div>
            <div class="flex gap-2"><button onclick="editAssessment('${q.id}')" class="btn-secondary px-3 py-2 rounded-lg text-sm">✏️ Edit</button><button onclick="deleteAssessment('${q.id}')" class="text-red-400 px-3 py-2 text-sm hover:bg-red-500/10 rounded-lg">🗑️ Delete</button></div>
          </div>
        </div>
      `).join('')}</div>`;
    }
    
    function copyCode(code) { navigator.clipboard.writeText(code); toast('Code copied: ' + code); }
    
    function deleteAssessment(id) {
      const quiz = allQuizzes.find(q => q.id === id);
      if (confirm(`Delete "${quiz?.title || 'assessment'}"? Submissions will be kept.`)) {
        allQuizzes = allQuizzes.filter(q => q.id !== id);
        saveQuizzes();
        renderQuizzesList(document.getElementById('teacherContent'));
        toast('Assessment deleted');
      }
    }
    
    function editAssessment(id) {
      const quiz = allQuizzes.find(q => q.id === id);
      if (!quiz) return;
      editingQuizId = id;
      questionsList = JSON.parse(JSON.stringify(quiz.questions));
      showTeacherTab('create');
      setTimeout(() => {
        document.getElementById('edit-title').value = quiz.title;
        document.getElementById('edit-subject').value = quiz.subject;
        document.getElementById('edit-passing').value = quiz.passing_mark;
        document.getElementById('edit-time').value = quiz.time_limit;
        document.getElementById('edit-rules').value = quiz.rules || '';
        document.getElementById('edit-footer').value = quiz.footer || '';
        renderQuestionsEditor();
      }, 100);
    }
    
    function renderQuestionsEditor() {
      const container = document.getElementById('questions-editor');
      if (!container) return;
      if (!questionsList.length) { container.innerHTML = '<div class="text-center py-8 text-slate-400">No questions added. Click buttons below to add questions.</div>'; return; }
      container.innerHTML = questionsList.map((q, idx) => `
        <div class="glass-light rounded-xl p-5 mb-4 border-l-4 border-cyan-500 transform hover:scale-[1.01] transition-all">
          <div class="flex justify-between items-center mb-3"><span class="text-xs font-bold text-cyan-400 uppercase">${q.type === 'multiple' ? '📋 Multiple Choice' : q.type === 'truefalse' ? '✓ True/False' : '📝 Short Answer'} #${idx+1}</span><button onclick="removeQuestionItem(${idx})" class="text-red-400 hover:text-red-300">✖ Remove</button></div>
          <textarea class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-3 text-white mb-3" placeholder="Question text" data-field="text" data-idx="${idx}">${escapeHtml(q.text)}</textarea>
          ${q.type === 'multiple' ? `
            <div class="space-y-2 mb-3"><label class="text-xs text-slate-400">Options</label>${[0,1,2,3].map(i => `<input type="text" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 text-white" placeholder="Option ${String.fromCharCode(65+i)}" data-field="opt${i}" data-idx="${idx}" value="${escapeHtml(q.options[i] || '')}">`).join('')}</div>
            <div class="flex gap-4"><div><label class="text-xs text-slate-400">Correct (1-4)</label><input type="number" min="1" max="4" class="w-24 bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2" data-field="correct" data-idx="${idx}" value="${(q.correct || 0)+1}"></div><div><label class="text-xs text-slate-400">Points</label><input type="number" min="1" class="w-24 bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2" data-field="points" data-idx="${idx}" value="${q.points || 1}"></div></div>
          ` : q.type === 'truefalse' ? `
            <div class="flex gap-4"><div><label class="text-xs text-slate-400">Correct Answer</label><select class="bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2" data-field="correct" data-idx="${idx}"><option value="0" ${q.correct===0?'selected':''}>True</option><option value="1" ${q.correct===1?'selected':''}>False</option></select></div><div><label class="text-xs text-slate-400">Points</label><input type="number" min="1" class="w-24 bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2" data-field="points" data-idx="${idx}" value="${q.points || 1}"></div></div>
          ` : `
            <div class="mb-3"><label class="text-xs text-slate-400">Model Answer (keywords)</label><input type="text" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2" data-field="correct" data-idx="${idx}" value="${escapeHtml(q.correct || '')}"></div>
            <div><label class="text-xs text-slate-400">Points</label><input type="number" min="1" class="w-24 bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2" data-field="points" data-idx="${idx}" value="${q.points || 1}"></div>
          `}
        </div>
      `).join('');
    }
    
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    window.removeQuestionItem = (idx) => { questionsList.splice(idx, 1); renderQuestionsEditor(); };
    
    function addNewQuestion(type) {
      const newQ = { type, text: '', options: type === 'multiple' ? ['','','',''] : [], correct: 0, points: 1 };
      questionsList.push(newQ);
      renderQuestionsEditor();
    }
    
    function saveQuestionsFromEditor() {
      for (let i = 0; i < questionsList.length; i++) {
        const q = questionsList[i];
        q.text = document.querySelector(`[data-field="text"][data-idx="${i}"]`)?.value || '';
        if (q.type === 'multiple') {
          q.options = [0,1,2,3].map(j => document.querySelector(`[data-field="opt${j}"][data-idx="${i}"]`)?.value || '');
          q.correct = (parseInt(document.querySelector(`[data-field="correct"][data-idx="${i}"]`)?.value) || 1) - 1;
          q.points = parseInt(document.querySelector(`[data-field="points"][data-idx="${i}"]`)?.value) || 1;
        } else if (q.type === 'truefalse') {
          q.correct = parseInt(document.querySelector(`[data-field="correct"][data-idx="${i}"]`)?.value) || 0;
          q.points = parseInt(document.querySelector(`[data-field="points"][data-idx="${i}"]`)?.value) || 1;
        } else {
          q.correct = document.querySelector(`[data-field="correct"][data-idx="${i}"]`)?.value || '';
          q.points = parseInt(document.querySelector(`[data-field="points"][data-idx="${i}"]`)?.value) || 1;
        }
      }
    }
    
    function renderCreateForm(container) {
      container.innerHTML = `
        <div class="glass rounded-2xl p-8 max-w-4xl mx-auto"><h2 class="font-heading text-3xl font-bold mb-2">📝 Create Assessment</h2><p class="text-slate-400 mb-6">Professional exam paper with rules and marking criteria</p>
        <form id="assessmentForm" onsubmit="saveAssessment(event)"><div class="grid md:grid-cols-2 gap-6 mb-6"><div><label class="text-sm text-slate-400">Assessment Title</label><input id="edit-title" type="text" required class="w-full bg-slate-800/50 border-2 border-slate-700 rounded-xl px-4 py-3"></div><div><label class="text-sm text-slate-400">Subject</label><input id="edit-subject" type="text" required class="w-full bg-slate-800/50 border-2 border-slate-700 rounded-xl px-4 py-3"></div><div><label class="text-sm text-slate-400">Passing Mark (%)</label><input id="edit-passing" type="number" min="0" max="100" value="50" class="w-full bg-slate-800/50 border-2 border-slate-700 rounded-xl px-4 py-3"></div><div><label class="text-sm text-slate-400">Time Limit (minutes)</label><input id="edit-time" type="number" min="0" value="30" class="w-full bg-slate-800/50 border-2 border-slate-700 rounded-xl px-4 py-3"></div></div>
        <div class="mb-6"><label class="text-sm text-slate-400">📋 Exam Rules / Instructions</label><textarea id="edit-rules" rows="3" class="w-full bg-slate-800/50 border-2 border-slate-700 rounded-xl px-4 py-3" placeholder="No calculators allowed. Answer all questions..."></textarea></div>
        <div class="mb-6"><label class="text-sm text-slate-400">📄 Exam Footer</label><textarea id="edit-footer" rows="2" class="w-full bg-slate-800/50 border-2 border-slate-700 rounded-xl px-4 py-3" placeholder="© School Name - Confidential"></textarea></div>
        <div class="mb-6"><label class="text-sm text-slate-400 font-bold mb-2 block">Questions</label><div id="questions-editor" class="space-y-4 mb-4"></div><div class="flex flex-wrap gap-2"><button type="button" onclick="addNewQuestion('multiple')" class="btn-secondary px-4 py-2 rounded-lg text-sm">+ Multiple Choice</button><button type="button" onclick="addNewQuestion('truefalse')" class="btn-secondary px-4 py-2 rounded-lg text-sm">+ True/False</button><button type="button" onclick="addNewQuestion('short')" class="btn-secondary px-4 py-2 rounded-lg text-sm">+ Short Answer</button></div></div>
        <div class="flex gap-4"><button type="submit" class="btn-primary px-8 py-3 rounded-xl text-white font-bold">${editingQuizId ? 'Update Assessment' : 'Create Assessment'}</button><button type="button" onclick="showTeacherTab('quizzes')" class="btn-secondary px-8 py-3 rounded-xl font-bold">Cancel</button></div></form></div>
      `;
      if (questionsList.length) renderQuestionsEditor();
      if (typeof lucide !== 'undefined') setTimeout(() => lucide.createIcons(), 50);
    }
    
    function saveAssessment(e) {
      e.preventDefault();
      saveQuestionsFromEditor();
      if (questionsList.length === 0) { toast('Add at least one question', 'error'); return; }
      const assessment = {
        id: editingQuizId || Date.now().toString(36),
        title: document.getElementById('edit-title').value,
        subject: document.getElementById('edit-subject').value,
        code: editingQuizId ? allQuizzes.find(q=>q.id===editingQuizId)?.code : Math.random().toString(36).substring(2,8).toUpperCase(),
        passing_mark: parseInt(document.getElementById('edit-passing').value),
        time_limit: parseInt(document.getElementById('edit-time').value),
        rules: document.getElementById('edit-rules').value,
        footer: document.getElementById('edit-footer').value,
        questions: [...questionsList]
      };
      if (editingQuizId) { allQuizzes = allQuizzes.map(q => q.id === editingQuizId ? assessment : q); toast('Assessment updated'); }
      else { allQuizzes.push(assessment); toast('Assessment created! Code: ' + assessment.code); }
      saveQuizzes();
      editingQuizId = null;
      questionsList = [];
      showTeacherTab('quizzes');
    }
    
    function renderSubmissionsTable(container) {
      if (!allSubmissions.length) { container.innerHTML = '<div class="glass rounded-2xl p-12 text-center"><div class="text-6xl mb-4">📊</div><p>No submissions yet</p></div>'; return; }
      container.innerHTML = `
        <div class="glass rounded-2xl overflow-hidden"><div class="p-4 border-b border-slate-700/50 flex justify-between flex-wrap gap-3"><h2 class="font-bold">Student Submissions</h2><div class="flex gap-2"><select id="sortSubmissions" onchange="refreshSubmissions()" class="bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm"><option value="recent">Most Recent</option><option value="highest">Highest Score</option><option value="lowest">Lowest Score</option><option value="name-az">Name A-Z</option></select></div></div>
        <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="text-slate-400 border-b border-slate-700/50"><tr><th class="px-4 py-3">Student</th><th class="px-4 py-3">Class</th><th class="px-4 py-3">Quiz</th><th class="px-4 py-3">Score</th><th class="px-4 py-3">Status</th><th class="px-4 py-3">Violations</th><th class="px-4 py-3">Time</th></tr></thead><tbody id="submissionsTableBody"></tbody></table></div></div>
      `;
      refreshSubmissions();
    }
    
    function refreshSubmissions() {
      let sorted = [...allSubmissions];
      const sort = document.getElementById('sortSubmissions')?.value || 'recent';
      if (sort === 'highest') sorted.sort((a,b)=>b.percentage - a.percentage);
      else if (sort === 'lowest') sorted.sort((a,b)=>a.percentage - b.percentage);
      else if (sort === 'name-az') sorted.sort((a,b)=>a.studentName.localeCompare(b.studentName));
      else sorted.sort((a,b)=>new Date(b.date) - new Date(a.date));
      const tbody = document.getElementById('submissionsTableBody');
      if (tbody) {
        tbody.innerHTML = sorted.map(s => {
          const pass = s.percentage >= (allQuizzes.find(q=>q.id===s.quizId)?.passing_mark || 50);
          return `<tr class="border-b border-slate-700/30 hover:bg-slate-800/30"><td class="px-4 py-3 font-medium">${s.studentName}</td><td class="px-4 py-3">${s.studentClass}</td><td class="px-4 py-3">${s.quizTitle}</td><td class="px-4 py-3 font-bold ${pass?'text-green-400':'text-red-400'}">${s.percentage}%</td><td class="px-4 py-3"><span class="px-2 py-1 rounded text-xs ${pass?'bg-green-500/20 text-green-400':'bg-red-500/20 text-red-400'}">${pass?'✓ Pass':'✗ Fail'}</span></td><td class="px-4 py-3"><span class="px-2 py-1 rounded text-xs ${(s.violations||0)>0?'bg-red-500/20 text-red-400':'bg-green-500/20'}">${s.violations||0}</span></td><td class="px-4 py-3 text-slate-400 text-xs">${s.timeTaken||'N/A'}</td></tr>`;
        }).join('');
      }
    }
    
    function renderAnalytics(container) {
      const avg = allSubmissions.length ? Math.round(allSubmissions.reduce((a,b)=>a+b.percentage,0)/allSubmissions.length) : 0;
      container.innerHTML = `<div class="grid md:grid-cols-4 gap-6 mb-8"><div class="glass rounded-2xl p-6 transform hover:scale-105 transition-all"><p class="text-slate-400 text-xs">Total Assessments</p><p class="text-4xl font-bold">${allQuizzes.length}</p></div><div class="glass rounded-2xl p-6 transform hover:scale-105 transition-all"><p class="text-slate-400 text-xs">Total Submissions</p><p class="text-4xl font-bold">${allSubmissions.length}</p></div><div class="glass rounded-2xl p-6 transform hover:scale-105 transition-all"><p class="text-slate-400 text-xs">Average Score</p><p class="text-4xl font-bold text-cyan-400">${avg}%</p></div><div class="glass rounded-2xl p-6 transform hover:scale-105 transition-all"><p class="text-slate-400 text-xs">Pass Rate</p><p class="text-4xl font-bold text-green-400">${allSubmissions.length?Math.round(allSubmissions.filter(s=>s.percentage>=50).length/allSubmissions.length*100):0}%</p></div></div><div class="glass rounded-2xl p-6"><h3 class="font-bold mb-4">Score Distribution</h3><canvas id="analyticsChart" height="200"></canvas></div>`;
      const ctx = document.getElementById('analyticsChart')?.getContext('2d');
      if (ctx) {
        const dist = [0,0,0,0,0];
        allSubmissions.forEach(s => { const i = Math.min(4, Math.floor(s.percentage/20)); dist[i]++; });
        new Chart(ctx, { type: 'bar', data: { labels: ['0-20%','21-40%','41-60%','61-80%','81-100%'], datasets: [{ label: 'Students', data: dist, backgroundColor: '#06b6d4', borderRadius: 8 }] }, options: { responsive: true, maintainAspectRatio: true } });
      }
    }
    
    // ==================== STUDENT FUNCTIONS ====================
    function handleStudentVerify(e) {
      e.preventDefault();
      currentStudent = { name: document.getElementById('studentName').value.trim(), class: document.getElementById('studentClass').value.trim(), sdms: document.getElementById('studentSDMS').value.trim() };
      showPage('student-portal');
      loadStudentDashboard();
      toast('Welcome, ' + currentStudent.name);
    }
    
    function logoutStudent() { isExamActive = false; currentStudent = null; showPage('landing'); }
    
    function loadStudentDashboard() {
      const container = document.getElementById('studentPortalContent');
      document.getElementById('studentPortalName').textContent = currentStudent?.name || '';
      container.innerHTML = `
        <div class="max-w-4xl mx-auto"><div class="glass rounded-2xl p-8 mb-6 transform hover:scale-[1.02] transition-all"><h2 class="text-2xl font-bold mb-4">🔐 Join Assessment</h2><form onsubmit="joinByCode(event)" class="flex gap-3"><input id="joinCode" type="text" maxlength="6" placeholder="Enter 6-digit code" class="flex-1 bg-slate-800/50 border-2 border-slate-700 rounded-xl px-5 py-4 uppercase tracking-wider focus:border-cyan-400 transition-all"><button type="submit" class="btn-primary px-8 py-4 rounded-xl font-bold">Join</button></form></div>
        <h3 class="font-bold text-xl mb-4">📚 Available Assessments</h3><div id="availableQuizzesList" class="space-y-3"></div>
        <h3 class="font-bold text-xl mb-4 mt-8">📊 My Results</h3><div id="myResultsList" class="space-y-3"></div></div>
      `;
      const takenIds = allSubmissions.filter(s=>s.sdmsCode===currentStudent?.sdms).map(s=>s.quizId);
      const available = allQuizzes.filter(q => !takenIds.includes(q.id));
      document.getElementById('availableQuizzesList').innerHTML = available.length ? available.map(q => `
        <div class="glass rounded-2xl p-5 flex justify-between items-center transform hover:scale-[1.02] transition-all"><div><p class="font-bold">${q.title}</p><p class="text-sm text-slate-400">${q.subject} • ${q.questions.length} questions • ${q.time_limit} min • Pass: ${q.passing_mark}%</p></div><button onclick="startExam('${q.id}')" class="btn-primary px-6 py-3 rounded-xl font-bold">Start Exam</button></div>
      `).join('') : '<div class="glass rounded-2xl p-8 text-center text-slate-400">No available assessments</div>';
      const myResults = allSubmissions.filter(s => s.sdmsCode === currentStudent?.sdms);
      document.getElementById('myResultsList').innerHTML = myResults.length ? myResults.map(s => `
        <div class="glass-light rounded-xl p-4 flex justify-between items-center transform hover:scale-[1.02] transition-all"><div><p class="font-bold">${s.quizTitle}</p><p class="text-xs text-slate-400">${s.date}</p></div><div class="text-right"><p class="font-bold text-lg ${s.percentage>=50?'text-green-400':'text-red-400'}">${s.percentage}%</p></div></div>
      `).join('') : '<div class="glass rounded-2xl p-8 text-center text-slate-400">No results yet</div>';
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }
    
    function joinByCode(e) { e.preventDefault(); const code = document.getElementById('joinCode').value.trim().toUpperCase(); const quiz = allQuizzes.find(q=>q.code===code); if(quiz) startExam(quiz.id); else toast('Invalid code','error'); }
    
    function startExam(quizId) {
      currentQuiz = allQuizzes.find(q=>q.id===quizId);
      currentQuestionIdx = 0;
      studentAnswers = new Array(currentQuiz.questions.length).fill(null);
      violationLogs = [];
      examLocked = false;
      isExamActive = true;
      if (timerInterval) clearInterval(timerInterval);
      document.getElementById('quizTitleDisplay').textContent = currentQuiz.title;
      document.getElementById('violationCount').textContent = '0';
      if (currentQuiz.time_limit > 0) startTimer(currentQuiz.time_limit * 60);
      showPage('quiz-taking');
      renderExamQuestion();
      toast('🔒 Exam security active. No tab switching allowed.');
    }
    
    function startTimer(seconds) {
      timeRemaining = seconds;
      updateTimerDisplay();
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (timeRemaining > 0) {
          timeRemaining--;
          updateTimerDisplay();
        }
        if (timeRemaining <= 0) {
          clearInterval(timerInterval);
          toast("⏰ Time's up! Submitting exam...");
          setTimeout(() => submitQuiz(), 500);
        }
      }, 1000);
    }
    
    function updateTimerDisplay() {
      const m = Math.floor(timeRemaining / 60);
      const s = timeRemaining % 60;
      const timerEl = document.getElementById('timerDisplay');
      if (timerEl) timerEl.textContent = `${m}:${s.toString().padStart(2, '0')}`;
      if (timeRemaining <= 60) timerEl?.classList.add('text-red-400', 'animate-pulse');
    }
    
    function renderExamQuestion() {
      const q = currentQuiz.questions[currentQuestionIdx];
      const total = currentQuiz.questions.length;
      document.getElementById('quizProgressDisplay').textContent = `Question ${currentQuestionIdx+1} of ${total}`;
      let html = `<div class="glass-strong rounded-2xl p-8 question-card"><div class="border-b border-cyan-500/30 pb-4 mb-4"><h2 class="text-2xl font-bold">${currentQuiz.title}</h2><p class="text-slate-400">${currentQuiz.subject} Examination</p></div><div class="bg-cyan-500/10 p-4 rounded-lg mb-6"><p class="font-bold text-sm">📋 Rules:</p><p class="text-sm text-slate-300">${currentQuiz.rules || 'Standard exam rules apply'}</p></div><div class="mb-4"><span class="text-xs text-cyan-400">Question ${currentQuestionIdx+1}</span><span class="ml-4 px-2 py-1 bg-purple-500/20 rounded text-xs">${q.points} marks</span><p class="text-lg font-semibold mt-2">${escapeHtml(q.text)}</p></div>`;
      
      if (q.type === 'multiple') {
        html += `<div class="space-y-3 mt-4">${q.options.map((opt,i)=>`<button onclick="selectAnswer(${i})" class="quiz-option w-full text-left px-5 py-3 rounded-xl border ${studentAnswers[currentQuestionIdx]===i?'selected':''} group"><span class="font-bold text-cyan-400 mr-3">${String.fromCharCode(65+i)}</span>${escapeHtml(opt)}</button>`).join('')}</div>`;
      } else if (q.type === 'truefalse') {
        html += `<div class="flex gap-4 mt-4">${q.options.map((opt,i)=>`<button onclick="selectAnswer(${i})" class="quiz-option flex-1 py-3 rounded-xl border text-center ${studentAnswers[currentQuestionIdx]===i?'selected':''}">${opt}</button>`).join('')}</div>`;
      } else {
        html += `<textarea class="w-full bg-slate-800/50 border-2 border-slate-700 rounded-xl px-5 py-4 text-white h-32 mt-4 focus:border-cyan-400 transition-all" placeholder="Type your answer here..." oninput="studentAnswers[currentQuestionIdx]=this.value">${escapeHtml(studentAnswers[currentQuestionIdx]||'')}</textarea>`;
      }
      
      html += `<div class="mt-6 pt-4 border-t border-slate-700 text-center text-xs text-slate-500">${currentQuiz.footer || '© AfriQuiz Pro - Confidential'}</div></div>`;
      document.getElementById('quizQuestionContainer').innerHTML = html;
      document.getElementById('prevBtn').classList.toggle('hidden', currentQuestionIdx===0);
      document.getElementById('nextBtn').classList.toggle('hidden', currentQuestionIdx===total-1);
      document.getElementById('submitBtn').classList.toggle('hidden', currentQuestionIdx!==total-1);
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }
    
    window.selectAnswer = (i) => { studentAnswers[currentQuestionIdx] = i; renderExamQuestion(); };
    window.nextQuestion = () => { if(currentQuestionIdx < currentQuiz.questions.length-1){ currentQuestionIdx++; renderExamQuestion(); } };
    window.prevQuestion = () => { if(currentQuestionIdx > 0){ currentQuestionIdx--; renderExamQuestion(); } };
    
    function submitQuiz() {
      clearInterval(timerInterval);
      isExamActive = false;
      let earned = 0, total = 0;
      
      currentQuiz.questions.forEach((q, i) => {
        total += q.points;
        const userAnswer = studentAnswers[i];
        
        if (q.type === 'short') {
          const correct = (q.correct || '').toLowerCase().trim();
          const user = (userAnswer || '').toLowerCase().trim();
          if (correct && (user === correct || user.includes(correct))) {
            earned += q.points;
          }
        } 
        else if (userAnswer === q.correct) {
          earned += q.points;
        }
      });
      
      const percentage = total ? Math.round((earned / total) * 100) : 0;
      const passed = percentage >= (currentQuiz.passing_mark || 50);
      
      const submission = {
        id: Date.now().toString(),
        studentName: currentStudent.name,
        studentClass: currentStudent.class,
        sdmsCode: currentStudent.sdms,
        quizId: currentQuiz.id,
        quizTitle: currentQuiz.title,
        percentage: percentage,
        date: new Date().toLocaleString(),
        timeTaken: currentQuiz.time_limit ? `${currentQuiz.time_limit - Math.ceil(timeRemaining/60)} min` : 'N/A',
        deviceInfo: navigator.userAgent.substring(0, 50),
        violations: violationLogs.length
      };
      
      allSubmissions.push(submission);
      saveSubmissions();
      
      if (passed) showConfetti();
      
      document.getElementById('resultQuizName').textContent = currentQuiz.title;
      document.getElementById('resultScore').textContent = percentage + '%';
      document.getElementById('resultIcon').innerHTML = `<i data-lucide="${passed ? 'trophy' : 'alert-circle'}" class="w-12 h-12 ${passed ? 'text-green-400' : 'text-red-400'}"></i>`;
      document.getElementById('resultStatus').innerHTML = passed ? '🎉 Congratulations! You Passed!' : '📚 Keep Practicing!';
      document.getElementById('resultFeedback').innerHTML = `<p class="font-bold mb-2">📊 Score: ${percentage}%</p><p>${percentage >= 80 ? 'Excellent work! 🌟' : percentage >= 60 ? 'Good effort! Keep improving. 💪' : 'Review your weak areas and try again. 📖'}</p><p class="text-xs text-slate-400 mt-2">Violations recorded: ${violationLogs.length}</p>`;
      
      showPage('quiz-result');
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }
    
    // Initialize everything
    generateParticles();
    loadQuizzes();
    loadSubmissions();
    initAntiCheat();
    renderApp();
    
    // Expose global functions
    window.handleCheatAcknowledge = handleCheatAcknowledge;
    window.addNewQuestion = addNewQuestion;
    window.saveAssessment = saveAssessment;
    window.editAssessment = editAssessment;
    window.deleteAssessment = deleteAssessment;
    window.copyCode = copyCode;
    window.exportAllSubmissionsCSV = exportAllSubmissionsCSV;
    window.exportQuizzesJSON = exportQuizzesJSON;
    window.printReport = printReport;
    window.exportStudentReport = exportStudentReport;
    window.refreshSubmissions = refreshSubmissions;
    window.joinByCode = joinByCode;
    window.startExam = startExam;
    window.showTeacherTab = showTeacherTab;
    window.showPage = showPage;
    window.handleTeacherLogin = handleTeacherLogin;
    window.handleStudentVerify = handleStudentVerify;
    window.logoutTeacher = logoutTeacher;
    window.logoutStudent = logoutStudent;
    window.loadStudentDashboard = loadStudentDashboard;
    window.submitQuiz = submitQuiz;
    window.selectAnswer = selectAnswer;
    window.nextQuestion = nextQuestion;
    window.prevQuestion = prevQuestion;
    window.removeQuestionItem = removeQuestionItem;
  </script>
</body>
</html>
