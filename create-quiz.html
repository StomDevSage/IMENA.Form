<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Quiz - IMENA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 40px; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .form-card { background: white; padding: 30px; border-radius: 20px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input, textarea, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; }
        .question-card { background: #f9f9f9; padding: 20px; margin: 20px 0; border-radius: 15px; border-left: 4px solid #667eea; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-primary { background: #667eea; color: white; }
        .btn-success { background: #4CAF50; color: white; font-size: 18px; padding: 15px; width: 100%; }
        .btn-danger { background: #dc3545; color: white; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="navbar"><h2>📝 Create New Quiz</h2></div>
    <div class="container">
        <a href="teacher.html" class="back-link">← Back to Dashboard</a>
        
        <div class="form-card">
            <h3>Quiz Details</h3>
            <div class="form-group"><label>📌 Quiz Title</label><input type="text" id="quizTitle" placeholder="e.g., Mathematics Exam"></div>
            <div class="form-group"><label>📝 Description</label><textarea id="quizDesc" rows="3"></textarea></div>
            <div class="form-group"><label>⏱️ Duration (minutes)</label><input type="number" id="duration" placeholder="30" min="1"></div>
        </div>
        
        <div class="form-card">
            <h3>Questions</h3>
            <div id="questionsContainer"></div>
            <button class="btn btn-primary" onclick="addQuestion()">+ Add Question</button>
        </div>
        
        <button class="btn-success" onclick="saveQuiz()">💾 Save Quiz</button>
    </div>

    <script>
        let questions = [];
        let qCounter = 0;
        
        function addQuestion() {
            questions.push({ id: qCounter++, text: '', options: ['', '', '', ''], correct: 0, points: 5 });
            renderQuestions();
        }
        
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            let html = '';
            questions.forEach((q, idx) => {
                html += `<div class="question-card"><h4>Question ${idx+1}</h4>
                    <input type="text" placeholder="Question text" style="width:100%; margin-bottom:10px;" onchange="updateQ(${idx}, 'text', this.value)" value="${escapeHtml(q.text)}">
                    <p>Options:</p>`;
                ['A', 'B', 'C', 'D'].forEach((letter, optIdx) => {
                    html += `<input type="text" placeholder="Option ${letter}" style="width:100%; margin:5px 0;" onchange="updateQ(${idx}, 'opt', ${optIdx}, this.value)" value="${escapeHtml(q.options[optIdx])}">`;
                });
                html += `<select onchange="updateQ(${idx}, 'correct', parseInt(this.value))" style="width:100%; margin:10px 0;">
                    <option value="0" ${q.correct===0?'selected':''}>Correct: A</option>
                    <option value="1" ${q.correct===1?'selected':''}>Correct: B</option>
                    <option value="2" ${q.correct===2?'selected':''}>Correct: C</option>
                    <option value="3" ${q.correct===3?'selected':''}>Correct: D</option>
                </select>
                <input type="number" placeholder="Points" style="width:100%; margin:10px 0;" onchange="updateQ(${idx}, 'points', parseInt(this.value))" value="${q.points}">
                <button class="btn btn-danger" onclick="removeQ(${idx})">Remove</button></div>`;
            });
            container.innerHTML = html;
        }
        
        function updateQ(idx, field, sub, val) {
            if (field === 'opt') questions[idx].options[sub] = val;
            else if (field === 'text') questions[idx].text = val;
            else if (field === 'correct') questions[idx].correct = val;
            else if (field === 'points') questions[idx].points = val;
        }
        
        function removeQ(idx) { questions.splice(idx, 1); renderQuestions(); }
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        
        function saveQuiz() {
            const title = document.getElementById('quizTitle').value;
            const desc = document.getElementById('quizDesc').value;
            const duration = parseInt(document.getElementById('duration').value);
            
            if (!title) { alert('Enter quiz title!'); return; }
            if (!duration) { alert('Enter duration!'); return; }
            if (questions.length === 0) { alert('Add at least one question!'); return; }
            
            const quizzes = JSON.parse(localStorage.getItem('quizzes') || '[]');
            const newQuiz = {
                id: Date.now().toString(),
                title, description: desc, durationMinutes: duration,
                questions: questions,
                totalPoints: questions.reduce((s, q) => s + q.points, 0),
                createdAt: new Date().toISOString()
            };
            quizzes.push(newQuiz);
            localStorage.setItem('quizzes', JSON.stringify(quizzes));
            alert('✅ Quiz created!');
            window.location.href = 'teacher.html';
        }
        
        addQuestion();
    </script>
</body>
</html>
